name: Update Movies and Series Data

on:
  schedule:
    - cron: '0 */6 * * *' # يعمل كل 6 ساعات
  workflow_dispatch:      # يسمح لك بتشغيله يدوياً في أي وقت

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد Node.js (بدون كاش لتجنب خطأ الـ lock file)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. تثبيت مكتبة jsdom مباشرة
      - name: Install Dependencies
        run: npm install jsdom

      # 4. تشغيل سكربت الاستخراج
      - name: Run Scraper
        run: node scraper.js

      # 5. رفع الملفات الناتجة للمستودع
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # إضافة ملفات JSON من مجلدي movies و series
          git add movies/*.json series/*.json
          
          # تنفيذ الحفظ في حال وجود تغييرات
          git commit -m "Automated update: $(date '+%Y-%m-%d %H:%M')" || echo "No changes to commit"
          
          # دفع التغييرات للمستودع
          git push
